[workspace]
members = [
    "crates/greentic-x-contracts",
    "crates/greentic-x-events",
    "crates/greentic-x-ops",
    "crates/greentic-x-runtime",
    "crates/greentic-x-types",
    "examples/end-to-end-demo",
    "examples/simple-case-app",
    "examples/simple-playbook-app",
]
resolver = "2"

[workspace.package]
version = "0.4.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/greentic-ng/greentic-x"
homepage = "https://github.com/greentic-ng/greentic-x"
documentation = "https://docs.rs/greentic-x-types"
readme = "README.md"
authors = ["Greentic"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unwrap_used = "deny"

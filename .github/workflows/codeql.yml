name: CodeQL
# GitHub CodeQL default setup is enabled for this repository. Keep the
# advanced reusable workflow manual-only to avoid duplicate SARIF uploads.
on:
  workflow_dispatch:
permissions:
  security-events: write
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    uses: greenticai/.github/.github/workflows/codeql.yml@main

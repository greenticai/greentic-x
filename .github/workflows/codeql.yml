name: CodeQL
on:
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * 1"
permissions:
  security-events: write
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    uses: greenticai/.github/.github/workflows/codeql.yml@main

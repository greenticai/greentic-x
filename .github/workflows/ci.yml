name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  package-dry-run:
    runs-on: ubuntu-latest
    env:
      CARGO_BINSTALL_VERSION: 1.17.6
      GREENTIC_PACK_VERSION: 0.4.109
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        id: cargo-binstall-cache
        with:
          path: ~/.cargo/bin/cargo-binstall
          key: ${{ runner.os }}-cargo-binstall-${{ env.CARGO_BINSTALL_VERSION }}
      - if: steps.cargo-binstall-cache.outputs.cache-hit != 'true'
        uses: cargo-bins/cargo-binstall@main
        with:
          version: ${{ env.CARGO_BINSTALL_VERSION }}
      - uses: actions/cache@v4
        id: greentic-pack-cache
        with:
          path: ~/.cargo/bin/greentic-pack
          key: ${{ runner.os }}-greentic-pack-${{ env.GREENTIC_PACK_VERSION }}
      - run: bash ci/install_greentic_pack.sh
      - run: cargo build --all-features
      - run: cargo doc --no-deps --all-features
      - run: bash ci/local_check.sh

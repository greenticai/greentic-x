name: Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to publish, for example v0.1.0
        required: true
        type: string
  push:
    branches:
      - main
      - master
    tags:
      - v*

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  release-metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      create_release: ${{ steps.version.outputs.create_release }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 ci/publishable_crates.py --format workspace-version)"
          create_release=false
          tag=""
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.release_tag }}"
            create_release=true
          elif [[ "${GITHUB_REF_TYPE}" = "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            create_release=true
          else
            branch="${GITHUB_REF_NAME}"
            if [ "$branch" != "main" ] && [ "$branch" != "master" ]; then
              printf 'publish workflow only supports main/master branch pushes or version tags\n' >&2
              exit 1
            fi
          fi
          if [ "$create_release" = "true" ] && [ "$tag" != "v$version" ]; then
            printf 'tag %s does not match Cargo version v%s\n' "$tag" "$version" >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'create_release=%s\n' "$create_release" >> "$GITHUB_OUTPUT"

  publish-crates:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - release-metadata
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates.io packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release-metadata.outputs.version }}"
          python3 ci/publishable_crates.py --format names | while IFS= read -r crate_name; do
            [ -n "$crate_name" ] || continue
            published_version="$(cargo search "$crate_name" --limit 1 | sed -nE "s/^${crate_name} = \"([^\"]+)\".*/\\1/p" | head -n 1)"
            if [ "$published_version" = "$version" ]; then
              printf 'crate %s version %s already published; skipping\n' "$crate_name" "$version"
              continue
            fi
            cargo publish -p "$crate_name" --dry-run
            attempts=0
            while true; do
              publish_log="$(mktemp)"
              if cargo publish -p "$crate_name" 2>&1 | tee "$publish_log"; then
                rm -f "$publish_log"
                break
              fi
              if grep -q "already exists on crates.io index" "$publish_log"; then
                printf 'crate %s version %s already published; skipping\n' "$crate_name" "$version"
                rm -f "$publish_log"
                break
              fi
              rm -f "$publish_log"
              attempts=$((attempts + 1))
              published_version="$(cargo search "$crate_name" --limit 1 | sed -nE "s/^${crate_name} = \"([^\"]+)\".*/\\1/p" | head -n 1)"
              if [ "$published_version" = "$version" ]; then
                printf 'crate %s version %s became available during publish retries; skipping remaining attempts\n' "$crate_name" "$version"
                break
              fi
              if [ "$attempts" -ge 3 ]; then
                printf 'cargo publish failed for %s after %s attempts\n' "$crate_name" "$attempts" >&2
                exit 1
              fi
              sleep $((attempts * 10))
            done
            sleep 30
          done
      - name: Create GitHub release
        if: needs.release-metadata.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-metadata.outputs.tag }}
          generate_release_notes: true

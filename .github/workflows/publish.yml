name: Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to publish, for example v0.1.0
        required: true
        type: string
  push:
    branches:
      - main
      - master
    tags:
      - v*

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  release-metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      create_release: ${{ steps.version.outputs.create_release }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 ci/publishable_crates.py --format workspace-version)"
          create_release=false
          tag=""
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.release_tag }}"
            create_release=true
          elif [[ "${GITHUB_REF_TYPE}" = "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            create_release=true
          else
            branch="${GITHUB_REF_NAME}"
            if [ "$branch" != "main" ] && [ "$branch" != "master" ]; then
              printf 'publish workflow only supports main/master branch pushes or version tags\n' >&2
              exit 1
            fi
            tag="v$version"
            create_release=true
          fi
          if [ "$create_release" = "true" ] && [ "$tag" != "v$version" ]; then
            printf 'tag %s does not match Cargo version v%s\n' "$tag" "$version" >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'create_release=%s\n' "$create_release" >> "$GITHUB_OUTPUT"

  publish-crates:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - release-metadata
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates.io packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release-metadata.outputs.version }}"
          python3 ci/publishable_crates.py --format names | while IFS= read -r crate_name; do
            [ -n "$crate_name" ] || continue
            published_version="$(cargo search "$crate_name" --limit 1 | sed -nE "s/^${crate_name} = \"([^\"]+)\".*/\\1/p" | head -n 1)"
            if [ "$published_version" = "$version" ]; then
              printf 'crate %s version %s already published; skipping\n' "$crate_name" "$version"
              continue
            fi
            cargo publish -p "$crate_name" --dry-run
            attempts=0
            while true; do
              publish_log="$(mktemp)"
              if cargo publish -p "$crate_name" 2>&1 | tee "$publish_log"; then
                rm -f "$publish_log"
                break
              fi
              if grep -q "already exists on crates.io index" "$publish_log"; then
                printf 'crate %s version %s already published; skipping\n' "$crate_name" "$version"
                rm -f "$publish_log"
                break
              fi
              rm -f "$publish_log"
              attempts=$((attempts + 1))
              published_version="$(cargo search "$crate_name" --limit 1 | sed -nE "s/^${crate_name} = \"([^\"]+)\".*/\\1/p" | head -n 1)"
              if [ "$published_version" = "$version" ]; then
                printf 'crate %s version %s became available during publish retries; skipping remaining attempts\n' "$crate_name" "$version"
                break
              fi
              if [ "$attempts" -ge 3 ]; then
                printf 'cargo publish failed for %s after %s attempts\n' "$crate_name" "$attempts" >&2
                exit 1
              fi
              sleep $((attempts * 10))
            done
            sleep 30
          done

  build-binstall:
    needs:
      - lint
      - test
      - release-metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
          - os: macos-15
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build greentic-x release binary
        shell: bash
        run: cargo build -p greentic-x --release --target "${{ matrix.target }}"
      - name: Package greentic-x binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release-metadata.outputs.version }}"
          target="${{ matrix.target }}"
          out_dir="$RUNNER_TEMP/binstall"
          mkdir -p "$out_dir"
          binary="target/${target}/release/greentic-x"
          asset_name="greentic-x-v${version}-${target}.tar.gz"
          cp "$binary" "$out_dir/greentic-x"
          tar -C "$out_dir" -czf "$out_dir/$asset_name" greentic-x
          printf 'asset_path=%s\n' "$out_dir/$asset_name" >> "$GITHUB_OUTPUT"
        id: package_unix
      - name: Package greentic-x binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.release-metadata.outputs.version }}"
          $target = "${{ matrix.target }}"
          $outDir = Join-Path $env:RUNNER_TEMP "binstall"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $binary = "target/$target/release/greentic-x.exe"
          $assetName = "greentic-x-v$version-$target.zip"
          Copy-Item $binary (Join-Path $outDir "greentic-x.exe")
          Compress-Archive -Path (Join-Path $outDir "greentic-x.exe") -DestinationPath (Join-Path $outDir $assetName) -Force
          "asset_path=$(Join-Path $outDir $assetName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: package_windows
      - uses: actions/upload-artifact@v4
        if: runner.os != 'Windows'
        with:
          name: greentic-x-${{ matrix.target }}
          path: ${{ steps.package_unix.outputs.asset_path }}
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: greentic-x-${{ matrix.target }}
          path: ${{ steps.package_windows.outputs.asset_path }}

  github-release:
    needs:
      - release-metadata
      - publish-crates
      - build-binstall
    if: needs.release-metadata.outputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: greentic-x-*
          merge-multiple: true
      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-metadata.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          append_body: true
          files: dist/*
